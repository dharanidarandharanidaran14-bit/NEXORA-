    let currentIndex = 0;

    function startApp() {
        document.getElementById('landing-page').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        
        // Check if there is a saved note position from last time
        const savedIndex = localStorage.getItem('lastReadNoteIndex');
        
        if (savedIndex !== null) {
            let nextIndex = parseInt(savedIndex) + 1;
            // Loop back cleanly if user reached the absolute end of the 700 notes deck
            if (nextIndex >= notes.length) {
                nextIndex = 0;
            }
            currentIndex = nextIndex;
        } else {
            currentIndex = 0; 
        }
        
        updateCard();
    }

    function goBack() {
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('landing-page').style.display = 'block';
    }

    function updateCard() {
        document.getElementById('note-box').innerText = notes[currentIndex];
        document.getElementById('prev-btn').disabled = (currentIndex === 0);
        document.getElementById('next-btn').disabled = (currentIndex === notes.length - 1);
        
        // Save position continuously inside localStorage
        localStorage.setItem('lastReadNoteIndex', currentIndex);
    }

    function nextNote() {
        if (currentIndex < notes.length - 1) {
            currentIndex++;
            updateCard();
        }
    }

    function prevNote() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }
